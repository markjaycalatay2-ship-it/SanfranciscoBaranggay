<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resident Directory - Barangay Complaint System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1>Barangay Complaint System - Admin</h1>
        <div class="user-info">
            <span>Welcome, <span id="userFullName">Loading...</span></span>
            <button class="btn btn-secondary btn-sm" onclick="logout()">Logout</button>
        </div>
    </header>

    <div class="layout-container">
        <aside class="sidebar">
            <nav>
                <a href="/admin-dashboard">Dashboard</a>
                <a href="/manage-reports">Manage Reports</a>
                <a href="/user-approval">User Approval</a>
                <a href="/resident-directory" class="active">Resident Directory</a>
                <a href="/transaction-history">Transaction History</a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="card">
                <h2>Resident Directory</h2>
                <p>View all registered residents in the barangay system.</p>
            </div>

            <div class="card">
                <div id="alert-container"></div>
                
                <!-- Search -->
                <div style="margin-bottom: 1.5rem;">
                    <input type="text" id="searchInput" placeholder="Search residents by name, username, or address..." 
                           style="width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;">
                </div>

                <div id="residentsContainer">
                    <div class="loading">Loading residents...</div>
                </div>
            </div>
        </main>
    </div>

    <script>
        let allResidents = [];
        let filteredResidents = [];

        // Load user information
        async function loadUserInfo() {
            try {
                const response = await fetch('/api/user-info');
                if (response.ok) {
                    const user = await response.json();
                    document.getElementById('userFullName').textContent = user.fullName;
                } else {
                    window.location.href = '/login';
                }
            } catch (error) {
                window.location.href = '/login';
            }
        }

        // Load residents
        async function loadResidents() {
            const container = document.getElementById('residentsContainer');
            container.innerHTML = '<div class="loading">Loading residents...</div>';
            
            try {
                console.log('Fetching residents...');
                const response = await fetch('/api/all-residents');
                console.log('Response status:', response.status);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error('Server error ' + response.status + ': ' + errorText);
                }
                
                allResidents = await response.json();
                console.log('Loaded residents:', allResidents.length, allResidents);
                
                if (!allResidents || allResidents.length === 0) {
                    container.innerHTML = '<div class="empty-state"><h3>No residents found</h3><p>There are no registered residents in the system.</p></div>';
                    return;
                }
                
                filteredResidents = [...allResidents];
                displayResidents(filteredResidents);
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = '<div class="empty-state" style="color:red;"><h3>Error loading residents</h3><p>' + error.message + '</p><button class="btn btn-primary" onclick="loadResidents()">Retry</button></div>';
            }
        }

        // Display residents
        function displayResidents(residentsToDisplay) {
            const container = document.getElementById('residentsContainer');
            
            if (!residentsToDisplay || residentsToDisplay.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>No residents found</h3><p>No residents match your search.</p></div>';
                return;
            }
            
            const tableHTML = `
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Age</th>
                                <th>Gender</th>
                                <th>Username</th>
                                <th>Contact</th>
                                <th>Address</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${residentsToDisplay.map(resident => `
                                <tr>
                                    <td><strong>${resident.full_name || 'N/A'}</strong></td>
                                    <td>${resident.age || '-'}</td>
                                    <td>${resident.gender || '-'}</td>
                                    <td>${resident.username || '-'}</td>
                                    <td>${resident.contact_number || '-'}</td>
                                    <td>${resident.address || '-'}</td>
                                    <td><span class="status-badge status-${resident.status || 'unknown'}">${resident.status || 'unknown'}</span></td>
                                    <td>
                                        <div class="action-buttons">
                                            <button class="btn btn-sm btn-danger" onclick="deleteUser(${resident.id}, '${(resident.full_name || 'Unknown').replace(/'/g, "\\'")}')">Delete</button>
                                        </div>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            
            container.innerHTML = tableHTML;
        }

        // Search function
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            
            filteredResidents = allResidents.filter(resident => {
                const fullName = (resident.full_name || '').toLowerCase();
                const username = (resident.username || '').toLowerCase();
                const address = (resident.address || '').toLowerCase();
                const contact = resident.contact_number || '';
                
                return fullName.includes(searchTerm) ||
                       username.includes(searchTerm) ||
                       address.includes(searchTerm) ||
                       contact.includes(searchTerm);
            });
            
            displayResidents(filteredResidents);
        });

        // Delete user function
        async function deleteUser(userId, userName) {
            if (!confirm(`Are you sure you want to delete ${userName}? This action cannot be undone and will permanently remove their account and all associated data (reports, logs, etc.).`)) {
                return;
            }
            
            try {
                const response = await fetch(`/api/users/${userId}`, {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showAlert(`${userName} deleted successfully`, 'success');
                    loadResidents(); // Reload the residents list
                } else {
                    showAlert(result.message, 'error');
                }
            } catch (error) {
                showAlert('An error occurred while deleting the user', 'error');
            }
        }

        // Show alert function
        function showAlert(message, type) {
            const alertContainer = document.getElementById('alert-container');
            alertContainer.innerHTML = `
                <div class="alert alert-${type}">
                    ${message}
                </div>
            `;
            
            setTimeout(() => {
                alertContainer.innerHTML = '';
            }, 5000);
        }

        // Logout function
        async function logout() {
            try {
                const response = await fetch('/logout', {
                    method: 'POST'
                });
                
                if (response.ok) {
                    window.location.href = '/login';
                }
            } catch (error) {
                console.error('Logout error:', error);
                window.location.href = '/login';
            }
        }

        // Initialize page
        document.addEventListener('DOMContentLoaded', () => {
            loadUserInfo();
            loadResidents();
        });
    </script>
</body>
</html>
